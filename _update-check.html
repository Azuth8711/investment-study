<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态导航系统更新检查</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .result { margin: 20px 0; padding: 15px; border-radius: 8px; }
        .success { background: #e8f5e8; border: 1px solid #4caf50; color: #2e7d32; }
        .error { background: #ffebee; border: 1px solid #f44336; color: #c62828; }
        .info { background: #e3f2fd; border: 1px solid #2196f3; color: #1565c0; }
        pre { background: #f5f5f5; padding: 15px; border-radius: 6px; overflow: auto; }
        .btn { 
            padding: 10px 20px; background: #2196f3; color: white; 
            border: none; border-radius: 6px; cursor: pointer; margin: 10px 5px;
        }
        .btn:hover { background: #1976d2; }
    </style>
</head>
<body>
    <h1>动态导航系统更新检查</h1>
    
    <div class="result info">
        <h3>系统概述</h3>
        <p>这个系统解决了您提出的"导航栏不会随新页面生成而更新"的问题。</p>
        <p>通过统一的 <code>_nav-data.json</code> 数据源和动态加载脚本，所有页面的导航栏现在可以自动同步更新。</p>
    </div>
    
    <button class="btn" onclick="checkSystem()">检查系统状态</button>
    <button class="btn" onclick="showExample()">显示示例代码</button>
    <button class="btn" onclick="testNav()">测试导航数据</button>
    
    <div id="resultContainer"></div>
    
    <script>
        async function checkSystem() {
            const container = document.getElementById('resultContainer');
            container.innerHTML = '<div class="result info">正在检查系统...</div>';
            
            try {
                // 检查数据文件
                const navResponse = await fetch('_nav-data.json');
                const navData = await navResponse.json();
                
                // 检查脚本文件
                const scriptResponse = await fetch('_nav-loader.js');
                const scriptText = await scriptResponse.text();
                
                // 检查示例页面
                const pageResponse = await fetch('Day_01.html');
                const pageText = await pageResponse.text();
                
                let result = `<div class="result success">
                    <h3>✅ 系统检查通过</h3>
                    <p><strong>数据文件：</strong> <code>_nav-data.json</code> 包含 ${navData.days.length} 个日推页面</p>
                    <p><strong>动态脚本：</strong> <code>_nav-loader.js</code> 已就绪（${scriptText.length} 字节）</p>
                    <p><strong>示例页面：</strong> Day_01.html 包含动态导航栏代码</p>
                    <p><strong>工作原理：</strong> 所有页面通过 JavaScript 动态加载导航数据，实现自动同步</p>
                </div>`;
                
                // 检查页面是否包含动态导航代码
                if (!pageText.includes('_nav-loader.js')) {
                    result += `<div class="result error">
                        <h3>⚠️ 警告：Day_01.html 可能未正确配置</h3>
                        <p>页面中未找到对 <code>_nav-loader.js</code> 的引用</p>
                    </div>`;
                }
                
                // 显示所有页面列表
                let pagesList = '<h4>当前页面列表：</h4><ul>';
                navData.days.forEach(day => {
                    pagesList += `<li><strong>Day ${day.num}:</strong> ${day.title} (<a href="${day.file}" target="_blank">${day.file}</a>)</li>`;
                });
                pagesList += '</ul>';
                
                result += `<div class="result info">${pagesList}</div>`;
                
                container.innerHTML = result;
            } catch (error) {
                container.innerHTML = `<div class="result error">
                    <h3>❌ 系统检查失败</h3>
                    <p>错误信息：${error.message}</p>
                    <p>请确保所有文件都存在且可访问。</p>
                </div>`;
            }
        }
        
        function showExample() {
            const container = document.getElementById('resultContainer');
            const example = `
<div class="result info">
    <h3>📝 示例代码</h3>
    
    <h4>1. _nav-data.json 结构：</h4>
    <pre>{
    "days": [
        {
            "num": 1,
            "title": "解读帕乔利的财富密码",
            "desc": "自序 + 第1章 · 财报认知建立 · 复式记账法 · 心理会计",
            "file": "Day_01.html",
            "date": "2026-03-24",
            "pages": "P6-10, P19-P27"
        },
        // ... 更多页面
    ],
    "totalPlanned": 10,
    "lastUpdated": "2026-03-27"
}</pre>
    
    <h4>2. 页面中的导航栏代码：</h4>
    <pre>&lt;!-- Nav -->
&lt;div class="nav-bar">
    &lt;!-- 导航栏将由 _nav-loader.js 动态生成 -->
&lt;/div>
&lt;!-- ... 页面内容 ... -->
&lt;script src="_nav-loader.js">&lt;/script></pre>
    
    <h4>3. 添加新页面的步骤：</h4>
    <ol>
        <li>创建新的 HTML 文件（如 Day_08.html）</li>
        <li>在 <code>_nav-data.json</code> 的 <code>days</code> 数组中添加新条目</li>
        <li>所有现有页面的导航栏将自动包含新页面的链接</li>
    </ol>
</div>`;
            
            container.innerHTML = example;
        }
        
        async function testNav() {
            const container = document.getElementById('resultContainer');
            container.innerHTML = '<div class="result info">正在测试导航数据...</div>';
            
            try {
                const response = await fetch('_nav-data.json');
                const navData = await response.json();
                
                // 模拟测试不同页面的导航栏
                let testResults = '<h3>🧪 导航栏生成测试</h3>';
                
                // 测试 Day 1
                const day1Index = 0;
                const day1Prev = null;
                const day1Next = navData.days[day1Index + 1];
                testResults += `<p><strong>Day 1:</strong> 首页 → Day ${day1Next.num}</p>`;
                
                // 测试中间页面
                const day4Index = 3;
                const day4Prev = navData.days[day4Index - 1];
                const day4Next = navData.days[day4Index + 1];
                testResults += `<p><strong>Day 4:</strong> Day ${day4Prev.num} ← 当前 → Day ${day4Next.num}</p>`;
                
                // 测试最后页面
                const lastIndex = navData.days.length - 1;
                const lastPrev = navData.days[lastIndex - 1];
                const lastNext = null;
                testResults += `<p><strong>Day ${navData.days[lastIndex].num}:</strong> Day ${lastPrev.num} ← 当前 → 无</p>`;
                
                container.innerHTML = `<div class="result success">${testResults}</div>`;
            } catch (error) {
                container.innerHTML = `<div class="result error">
                    <h3>❌ 测试失败</h3>
                    <p>错误信息：${error.message}</p>
                </div>`;
            }
        }
    </script>
</body>
</html>
