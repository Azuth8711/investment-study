<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股投资自学 · 学习日推</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f5f6f8;
            color: #2c3e50;
            line-height: 1.8;
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a5276 0%, #2e86c1 100%);
            color: #fff;
            padding: 40px 32px;
            border-radius: 16px;
            margin-bottom: 28px;
            box-shadow: 0 4px 20px rgba(26, 82, 118, 0.25);
            text-align: center;
        }
        .header .icon { font-size: 40px; margin-bottom: 12px; }
        .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .header .subtitle { font-size: 15px; opacity: 0.85; }
        .header .meta {
            display: flex; justify-content: center; gap: 20px;
            margin-top: 16px; font-size: 13px; opacity: 0.7;
        }

        /* Progress */
        .progress-bar {
            background: #fff; border-radius: 12px; padding: 20px 24px;
            margin-bottom: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .progress-bar h3 { font-size: 15px; color: #7f8c8d; margin-bottom: 12px; }
        .progress-track {
            background: #ecf0f1; border-radius: 10px; height: 12px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #2e86c1, #27ae60);
            height: 100%; border-radius: 10px; transition: width 0.5s;
        }
        .progress-text {
            display: flex; justify-content: space-between;
            font-size: 13px; color: #95a5a6; margin-top: 8px;
        }

        /* Card List */
        .card-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 40px; }
        .day-card {
            background: #fff; border-radius: 12px; padding: 22px 26px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            display: flex; align-items: center; gap: 20px;
            text-decoration: none; color: inherit;
            transition: all 0.25s; border-left: 4px solid transparent;
            cursor: pointer;
        }
        .day-card:hover {
            box-shadow: 0 6px 24px rgba(0,0,0,0.12);
            transform: translateY(-2px);
            border-left-color: #2e86c1;
        }
        .day-card .day-num {
            width: 52px; height: 52px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 18px; color: #fff;
            flex-shrink: 0;
        }
        .day-card:nth-child(1) .day-num { background: linear-gradient(135deg, #2e86c1, #3498db); }
        .day-card:nth-child(2) .day-num { background: linear-gradient(135deg, #c0392b, #e74c3c); }
        .day-card:nth-child(3) .day-num { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .day-card:nth-child(4) .day-num { background: linear-gradient(135deg, #8e44ad, #9b59b6); }
        .day-card:nth-child(5) .day-num { background: linear-gradient(135deg, #e67e22, #f39c12); }
        .day-card:nth-child(6) .day-num { background: linear-gradient(135deg, #16a085, #1abc9c); }
        .day-card:nth-child(7) .day-num { background: linear-gradient(135deg, #2c3e50, #34495e); }

        .day-card .day-info { flex: 1; }
        .day-card .day-info h3 { font-size: 16px; font-weight: 600; color: #2c3e50; margin-bottom: 4px; }
        .day-card .day-info p { font-size: 13px; color: #95a5a6; }
        .day-card .arrow {
            font-size: 18px; color: #bdc3c7; flex-shrink: 0;
            transition: color 0.2s, transform 0.2s;
        }
        .day-card:hover .arrow { color: #2e86c1; transform: translateX(4px); }

        .day-card.locked {
            opacity: 0.5; cursor: not-allowed; pointer-events: none;
        }
        .day-card.locked:hover {
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transform: none; border-left-color: transparent;
        }
        .day-card.locked .day-num {
            background: #bdc3c7 !important;
        }
        .day-card.locked .day-info h3::after {
            content: " 🔒"; font-size: 13px;
        }

        /* Footer */
        .footer {
            text-align: center; padding: 24px; color: #bdc3c7; font-size: 13px;
        }
        .footer a { color: #2e86c1; text-decoration: none; }

        /* Source Tag */
        .source-tag {
            display: inline-block; background: #eaf2f8; color: #1a5276;
            padding: 2px 10px; border-radius: 4px; font-size: 12px; font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header { padding: 28px 20px; }
            .header h1 { font-size: 22px; }
            .day-card { padding: 18px 20px; gap: 14px; }
            .day-card .day-num { width: 44px; height: 44px; font-size: 16px; }
            .day-card .day-info h3 { font-size: 15px; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <div class="icon">📈</div>
        <h1>A股投资自学之路</h1>
        <div class="subtitle">《财报就像一本故事书》· 每日学习推送</div>
        <div class="meta">
            <span>阶段一：财务基础</span>
            <span>2026年3月启动</span>
        </div>
    </div>

    <!-- Progress -->
    <div class="progress-bar">
        <h3>学习进度</h3>
        <div class="progress-track">
            <div class="progress-fill" style="width: 0%;"></div>
        </div>
        <div class="progress-text">
            <span id="progressLabel">已完成 0 / 0 天</span>
            <span id="progressPct">0%</span>
        </div>
    </div>

    <!-- Day Cards -->
    <div class="card-list" id="cardList">
        <!-- Cards will be generated by JS -->
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>基于《财报就像一本故事书》刘顺仁 著 · 台湾版</p>
        <p style="margin-top:4px;">内容由 AI 辅助生成，仅供学习参考</p>
        <div style="margin-top:12px; font-size:12px; color:#95a5a6;">
            <button onclick="reloadData()" style="padding:4px 8px; background:#ecf0f1; border:none; border-radius:4px; cursor:pointer;">🔄 重新加载数据</button>
            <span id="dataStatus" style="margin-left:10px;"></span>
        </div>
    </div>

</div>

<script>
    // Load navigation data from unified source
    let navData = {
        days: [],
        totalPlanned: 10,
        lastUpdated: ""
    };
    
    // Load nav data from JSON file
    fetch('_nav-data.json?_t=' + new Date().getTime())
        .then(response => response.json())
        .then(data => {
            navData = data;
            console.log('成功加载导航数据，包含', navData.days.length, '个日推条目');
            renderDayCards();
            updateProgress();
        })
        .catch(error => {
            console.error('Error loading nav data:', error);
            // Fallback to basic data
            navData.days = [
                { num: 1, title: "解读帕乔利的财富密码", desc: "第1章 · 财报认知建立 · 复式记账法 · 心理会计", file: "Day_01.html", date: "2026-03-24" },
                { num: 2, title: "用财务报表锻炼五大神功", desc: "第2章 · 五大神功框架 · 三类活动 · 四份报表", file: "Day_02.html", date: "2026-03-24" }
            ];
            console.log('使用后备数据，包含', navData.days.length, '个日推条目');
            renderDayCards();
            updateProgress();
        });

    // Render day cards
    function renderDayCards() {
        const cardList = document.getElementById('cardList');
        cardList.innerHTML = ''; // Clear existing cards
        
        // Render available days
        navData.days.forEach(day => {
            const card = document.createElement('a');
            card.className = 'day-card';
            card.href = day.file;
            card.innerHTML = `
                <div class="day-num">D${day.num}</div>
                <div class="day-info">
                    <h3>Day ${day.num}：${day.title}</h3>
                    <p>${day.desc}</p>
                </div>
                <span class="arrow">→</span>
            `;
            cardList.appendChild(card);
        });
        
        // Add locked placeholder cards
        const nextNum = navData.days.length > 0 ? navData.days[navData.days.length - 1].num + 1 : 1;
        for (let i = nextNum; i <= navData.totalPlanned; i++) {
            const card = document.createElement('div');
            card.className = 'day-card locked';
            card.innerHTML = `
                <div class="day-num">D${i}</div>
                <div class="day-info">
                    <h3>Day ${i}：待更新</h3>
                    <p>精彩内容筹备中...</p>
                </div>
                <span class="arrow">→</span>
            `;
            cardList.appendChild(card);
        }
    }

    // Update progress
    function updateProgress() {
        const completed = navData.days.length;
        const pct = Math.round(completed / navData.totalPlanned * 100);
        document.querySelector('.progress-fill').style.width = pct + '%';
        document.getElementById('progressLabel').textContent = `已完成 ${completed} / ${navData.totalPlanned} 天`;
        document.getElementById('progressPct').textContent = pct + '%';
        
        // Show data status
        document.getElementById('dataStatus').textContent = `已加载 ${completed} 个日推条目`;
    }
    
    // Reload data function
    function reloadData() {
        console.log('手动重新加载数据...');
        document.getElementById('dataStatus').textContent = '正在加载...';
        
        fetch('_nav-data.json?_t=' + new Date().getTime())
            .then(response => {
                console.log('响应状态:', response.status);
                return response.json();
            })
            .then(data => {
                navData = data;
                console.log('成功重新加载数据，包含', navData.days.length, '个日推条目');
                renderDayCards();
                updateProgress();
                document.getElementById('dataStatus').textContent = `已加载 ${navData.days.length} 个日推条目 (重新加载成功)`;
            })
            .catch(error => {
                console.error('重新加载数据失败:', error);
                document.getElementById('dataStatus').textContent = '重新加载失败，使用后备数据';
                
                // Fallback to basic data
                navData.days = [
                    { num: 1, title: "解读帕乔利的财富密码", desc: "第1章 · 财报认知建立 · 复式记账法 · 心理会计", file: "Day_01.html", date: "2026-03-24" },
                    { num: 2, title: "用财务报表锻炼五大神功", desc: "第2章 · 五大神功框架 · 三类活动 · 四份报表", file: "Day_02.html", date: "2026-03-24" }
                ];
                renderDayCards();
                updateProgress();
            });
    }
</script>

</body>
</html>
