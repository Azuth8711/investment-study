<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股投资自学 · 学习日推</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f5f6f8;
            color: #2c3e50;
            line-height: 1.8;
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a5276 0%, #2e86c1 100%);
            color: #fff;
            padding: 40px 32px;
            border-radius: 16px;
            margin-bottom: 28px;
            box-shadow: 0 4px 20px rgba(26, 82, 118, 0.25);
            text-align: center;
        }
        .header .icon { font-size: 40px; margin-bottom: 12px; }
        .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .header .subtitle { font-size: 15px; opacity: 0.85; }
        .header .meta {
            display: flex; justify-content: center; gap: 20px;
            margin-top: 16px; font-size: 13px; opacity: 0.7;
        }

        /* Phase Navigation */
        .phase-nav {
            background: #fff; border-radius: 12px; padding: 20px 24px;
            margin-bottom: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .phase-nav h3 { font-size: 15px; color: #7f8c8d; margin-bottom: 12px; }
        .phase-buttons {
            display: flex; gap: 10px; flex-wrap: wrap;
        }
        .phase-btn {
            padding: 8px 16px; border-radius: 8px; border: 1px solid #e0e0e0;
            background: #f8f9fa; color: #5a6c7d; font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
        }
        .phase-btn:hover {
            background: #eef2f7; border-color: #c8d1dc;
        }
        .phase-btn.active {
            background: linear-gradient(135deg, #2e86c1, #3498db);
            color: #fff; border-color: #2e86c1;
        }
        .phase-btn.locked {
            opacity: 0.5; cursor: not-allowed; pointer-events: none;
        }
        
        /* Phase Info */
        .phase-info {
            background: #fff; border-radius: 12px; padding: 20px 24px;
            margin-bottom: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .phase-info h3 { font-size: 15px; color: #7f8c8d; margin-bottom: 8px; }
        .phase-title { font-size: 18px; font-weight: 600; color: #2c3e50; margin-bottom: 4px; }
        .phase-desc { font-size: 13px; color: #95a5a6; margin-bottom: 8px; }
        .phase-meta { font-size: 12px; color: #7f8c8d; }
        
        /* Progress */
        .progress-bar {
            background: #fff; border-radius: 12px; padding: 20px 24px;
            margin-bottom: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .progress-bar h3 { font-size: 15px; color: #7f8c8d; margin-bottom: 12px; }
        .progress-track {
            background: #ecf0f1; border-radius: 10px; height: 12px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #2e86c1, #27ae60);
            height: 100%; border-radius: 10px; transition: width 0.5s;
        }
        .progress-text {
            display: flex; justify-content: space-between;
            font-size: 13px; color: #95a5a6; margin-top: 8px;
        }

        /* Card List */
        .card-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 40px; }
        .day-card {
            background: #fff; border-radius: 12px; padding: 22px 26px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            display: flex; align-items: center; gap: 20px;
            text-decoration: none; color: inherit;
            transition: all 0.25s; border-left: 4px solid transparent;
            cursor: pointer;
        }
        .day-card:hover {
            box-shadow: 0 6px 24px rgba(0,0,0,0.12);
            transform: translateY(-2px);
            border-left-color: #2e86c1;
        }
        .day-card .day-num {
            width: 52px; height: 52px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 18px; color: #fff;
            flex-shrink: 0;
        }
        .day-card:nth-child(1) .day-num { background: linear-gradient(135deg, #2e86c1, #3498db); }
        .day-card:nth-child(2) .day-num { background: linear-gradient(135deg, #c0392b, #e74c3c); }
        .day-card:nth-child(3) .day-num { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .day-card:nth-child(4) .day-num { background: linear-gradient(135deg, #8e44ad, #9b59b6); }
        .day-card:nth-child(5) .day-num { background: linear-gradient(135deg, #e67e22, #f39c12); }
        .day-card:nth-child(6) .day-num { background: linear-gradient(135deg, #16a085, #1abc9c); }
        .day-card:nth-child(7) .day-num { background: linear-gradient(135deg, #2c3e50, #34495e); }

        .day-card .day-info { flex: 1; }
        .day-card .day-info h3 { font-size: 16px; font-weight: 600; color: #2c3e50; margin-bottom: 4px; }
        .day-card .day-info p { font-size: 13px; color: #95a5a6; }
        .day-card .arrow {
            font-size: 18px; color: #bdc3c7; flex-shrink: 0;
            transition: color 0.2s, transform 0.2s;
        }
        .day-card:hover .arrow { color: #2e86c1; transform: translateX(4px); }

        .day-card.locked {
            opacity: 0.5; cursor: not-allowed; pointer-events: none;
        }
        .day-card.locked:hover {
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transform: none; border-left-color: transparent;
        }
        .day-card.locked .day-num {
            background: #bdc3c7 !important;
        }
        .day-card.locked .day-info h3::after {
            content: " 🔒"; font-size: 13px;
        }

        /* Footer */
        .footer {
            text-align: center; padding: 24px; color: #bdc3c7; font-size: 13px;
        }
        .footer a { color: #2e86c1; text-decoration: none; }

        /* Source Tag */
        .source-tag {
            display: inline-block; background: #eaf2f8; color: #1a5276;
            padding: 2px 10px; border-radius: 4px; font-size: 12px; font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header { padding: 28px 20px; }
            .header h1 { font-size: 22px; }
            .day-card { padding: 18px 20px; gap: 14px; }
            .day-card .day-num { width: 44px; height: 44px; font-size: 16px; }
            .day-card .day-info h3 { font-size: 15px; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <div class="icon">📈</div>
        <h1>A股投资自学之路</h1>
        <div class="subtitle">《财报就像一本故事书》· 每日学习推送</div>
        <div class="meta">
            <span>阶段一：财务基础</span>
            <span>2026年3月启动</span>
        </div>
    </div>

    <!-- Phase Navigation -->
    <div class="phase-nav">
        <h3>选择学习阶段</h3>
        <div class="phase-buttons" id="phaseButtons">
            <!-- Phase buttons will be generated by JS -->
        </div>
    </div>

    <!-- Phase Info -->
    <div class="phase-info" id="phaseInfo">
        <h3>当前阶段</h3>
        <div class="phase-title" id="phaseTitle">阶段一：补齐基本面短板</div>
        <div class="phase-desc" id="phaseDesc">从"只会看K线"升级到"能看懂一家公司"</div>
        <div class="phase-meta">
            <span>持续时长：<span id="phaseDuration">1-2个月</span></span>
            <span style="margin-left: 12px;">已完成天数：<span id="phaseCompletedDays">7</span> / <span id="phaseTotalDays">7</span></span>
        </div>
    </div>

    <!-- Progress -->
    <div class="progress-bar">
        <h3>整体学习进度</h3>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
        </div>
        <div class="progress-text">
            <span id="progressLabel">已完成 0 / 0 天</span>
            <span id="progressPct">0%</span>
        </div>
    </div>

    <!-- Day Cards -->
    <div class="card-list" id="cardList">
        <!-- Cards will be generated by JS -->
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>基于《财报就像一本故事书》刘顺仁 著 · 台湾版</p>
        <p style="margin-top:4px;">内容由 AI 辅助生成，仅供学习参考</p>
        <div style="margin-top:12px; font-size:12px; color:#95a5a6;">
            <button onclick="reloadData()" style="padding:4px 8px; background:#ecf0f1; border:none; border-radius:4px; cursor:pointer;">🔄 重新加载数据</button>
            <span id="dataStatus" style="margin-left:10px;"></span>
        </div>
    </div>

</div>

<script>
    // Phase Navigation System
    let allPhasesData = null;
    let currentPhaseNum = 1;
    let currentPhaseData = null;

    // Initialize the page
    console.log('初始化阶段导航系统...');
    
    // Load data from main JSON file first
    fetch('_nav-data.json?_t=' + Date.now())
        .then(response => {
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response.json();
        })
        .then(data => {
            console.log('成功加载主导航数据');
            allPhasesData = data;
            currentPhaseNum = data.currentPhase || 1;
            
            // Load current phase data
            loadPhaseData(currentPhaseNum);
            
            // Initialize phase buttons
            renderPhaseButtons();
        })
        .catch(error => {
            console.error('加载主导航数据失败:', error);
            // Fallback to embedded phase 1 data
            console.log('使用内嵌第一阶段数据');
            allPhasesData = {
                phases: [
                    {
                        phaseNum: 1,
                        name: "阶段一：补齐基本面短板",
                        description: "从\"只会看K线\"升级到\"能看懂一家公司\"",
                        duration: "1-2个月",
                        days: [
                            {
                                num: 1,
                                title: "解读帕乔利的财富密码",
                                desc: "自序 + 第1章 · 财报认知建立 · 复式记账法 · 心理会计",
                                file: "Day_01.html",
                                date: "2026-03-24",
                                pages: "P6-10, P19-P27"
                            },
                            {
                                num: 2,
                                title: "用财务报表锻炼五大神功",
                                desc: "第2章第1-2节 · 五大神功框架 · 三类活动 · 四份报表",
                                file: "Day_02.html",
                                date: "2026-03-24",
                                pages: "P36-41"
                            },
                            {
                                num: 3,
                                title: "财务报表数量关系与课责系统",
                                desc: "第2章第3-4节 · 存量与流量 · 财务报表关联性 · 课责系统",
                                file: "Day_03.html",
                                date: "2026-03-27",
                                pages: "P42-50"
                            },
                            {
                                num: 4,
                                title: "究天人之际：企业与环境互动",
                                desc: "第3章第1-2节 · 企业绩效与环境互动 · 柯达数字化转型 · 长篠合战启示",
                                file: "Day_04.html",
                                date: "2026-03-27",
                                pages: "P55-61"
                            },
                            {
                                num: 5,
                                title: "通古今之变：企业应变能力",
                                desc: "第3章第3节 · 企业竞争力与变革 · 华通与英特尔案例 · 清朝传统智慧",
                                file: "Day_05.html",
                                date: "2026-03-27",
                                pages: "P62-65"
                            },
                            {
                                num: 6,
                                title: "成一家之言：经理人判断差异",
                                desc: "第3章第4节 · 财务报表解读差异 · 大肠萎缩肥大案例 · 数字结构解析",
                                file: "Day_06.html",
                                date: "2026-03-27",
                                pages: "P66-68"
                            },
                            {
                                num: 7,
                                title: "资本市场预期：投资人的力量",
                                desc: "第3章第5节 · 资本市场预期反应 · 9.11事件分析 · 会计数字结构解析",
                                file: "Day_07.html",
                                date: "2026-03-27",
                                pages: "P69-72"
                            }
                        ],
                        totalDays: 7,
                        completedDays: 7,
                        nextPhaseFile: "Day_08.html"
                    }
                ],
                totalPhases: 4,
                currentPhase: 1,
                totalPlannedDays: 28,
                completedDays: 7,
                lastUpdated: "2026-03-27"
            };
            
            currentPhaseNum = 1;
            currentPhaseData = allPhasesData.phases[0];
            
            renderPhaseButtons();
            updatePhaseInfo();
            renderDayCards();
            updateProgress();
            
            const statusEl = document.getElementById('dataStatus');
            if (statusEl) {
                statusEl.textContent = `已加载内嵌数据 (阶段${currentPhaseNum})`;
                statusEl.style.color = '#e74c3c';
            }
        });

    // Load phase data from individual phase file
    function loadPhaseData(phaseNum) {
        const phaseFilename = `_nav-data-phase${phaseNum}.json`;
        
        fetch(phaseFilename + '?_t=' + Date.now())
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            })
            .then(data => {
                console.log(`成功加载阶段${phaseNum}数据`);
                currentPhaseData = data;
                
                // Update allPhasesData if needed
                if (allPhasesData && allPhasesData.phases) {
                    const phaseIndex = phaseNum - 1;
                    if (allPhasesData.phases[phaseIndex]) {
                        allPhasesData.phases[phaseIndex] = data;
                    }
                }
                
                updatePhaseInfo();
                renderDayCards();
                updateProgress();
            })
            .catch(error => {
                console.error(`加载阶段${phaseNum}数据失败:`, error);
                // Fallback to data from main file
                if (allPhasesData && allPhasesData.phases[phaseNum - 1]) {
                    currentPhaseData = allPhasesData.phases[phaseNum - 1];
                    updatePhaseInfo();
                    renderDayCards();
                    updateProgress();
                } else {
                    console.error('无法加载阶段数据，显示错误');
                    const cardList = document.getElementById('cardList');
                    cardList.innerHTML = '<div class="day-card" style="justify-content:center; color:#e74c3c;">加载失败，请刷新页面</div>';
                }
            });
    }

    // Switch to a different phase
    function switchPhase(phaseNum) {
        if (phaseNum === currentPhaseNum) return;
        
        console.log(`切换到阶段${phaseNum}`);
        currentPhaseNum = phaseNum;
        
        // Update active button
        document.querySelectorAll('.phase-btn').forEach(btn => {
            btn.classList.remove('active');
            if (parseInt(btn.dataset.phase) === phaseNum) {
                btn.classList.add('active');
            }
        });
        
        // Load phase data
        loadPhaseData(phaseNum);
    }

    // Render phase buttons
    function renderPhaseButtons() {
        const buttonsContainer = document.getElementById('phaseButtons');
        if (!buttonsContainer) return;
        
        buttonsContainer.innerHTML = '';
        
        if (!allPhasesData || !allPhasesData.phases) {
            buttonsContainer.innerHTML = '<div class="phase-btn">加载中...</div>';
            return;
        }
        
        allPhasesData.phases.forEach(phase => {
            const button = document.createElement('button');
            button.className = 'phase-btn';
            if (phase.phaseNum === currentPhaseNum) {
                button.classList.add('active');
            }
            if (phase.days.length === 0) {
                button.classList.add('locked');
            }
            
            button.dataset.phase = phase.phaseNum;
            button.textContent = `阶段${phase.phaseNum}`;
            button.onclick = () => switchPhase(phase.phaseNum);
            
            buttonsContainer.appendChild(button);
        });
    }

    // Update phase info display
    function updatePhaseInfo() {
        if (!currentPhaseData) return;
        
        document.getElementById('phaseTitle').textContent = currentPhaseData.name;
        document.getElementById('phaseDesc').textContent = currentPhaseData.description;
        document.getElementById('phaseDuration').textContent = currentPhaseData.duration;
        document.getElementById('phaseCompletedDays').textContent = currentPhaseData.completedDays || currentPhaseData.days.length;
        document.getElementById('phaseTotalDays').textContent = currentPhaseData.totalDays;
    }

    // Render day cards for current phase
    function renderDayCards() {
        const cardList = document.getElementById('cardList');
        if (!cardList) return;
        
        cardList.innerHTML = ''; // Clear existing cards
        
        if (!currentPhaseData || !currentPhaseData.days) {
            cardList.innerHTML = '<div class="day-card" style="justify-content:center; color:#e74c3c;">加载中...</div>';
            return;
        }
        
        // Render available days
        currentPhaseData.days.forEach(day => {
            const card = document.createElement('a');
            card.className = 'day-card';
            card.href = day.file;
            card.innerHTML = `
                <div class="day-num">D${day.num}</div>
                <div class="day-info">
                    <h3>Day ${day.num}：${day.title}</h3>
                    <p>${day.desc}</p>
                    <div style="margin-top:4px; font-size:11px; color:#95a5a6;">
                        页码：${day.pages} | 日期：${day.date}
                    </div>
                </div>
                <span class="arrow">→</span>
            `;
            cardList.appendChild(card);
        });
        
        // Add locked placeholder cards for future days in this phase
        const nextNum = currentPhaseData.days.length > 0 ? 
            currentPhaseData.days[currentPhaseData.days.length - 1].num + 1 : 1;
        
        for (let i = nextNum; i <= currentPhaseData.totalDays; i++) {
            const card = document.createElement('div');
            card.className = 'day-card locked';
            card.innerHTML = `
                <div class="day-num" style="background: #bdc3c7 !important;">D${i}</div>
                <div class="day-info">
                    <h3>Day ${i}：待更新</h3>
                    <p>精彩内容筹备中...</p>
                </div>
                <span class="arrow">→</span>
            `;
            cardList.appendChild(card);
        }
    }

    // Update progress
    function updateProgress() {
        if (!allPhasesData) return;
        
        const totalCompleted = allPhasesData.completedDays || 0;
        const totalPlanned = allPhasesData.totalPlannedDays || 0;
        const pct = totalPlanned > 0 ? Math.round(totalCompleted / totalPlanned * 100) : 0;
        
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressLabel').textContent = `已完成 ${totalCompleted} / ${totalPlanned} 天`;
        document.getElementById('progressPct').textContent = pct + '%';
        
        // Update data status
        const statusEl = document.getElementById('dataStatus');
        if (statusEl) {
            statusEl.textContent = `阶段${currentPhaseNum} | ${totalCompleted}/${totalPlanned}天 (${pct}%) | ${allPhasesData.lastUpdated}`;
            statusEl.style.color = pct >= 100 ? '#27ae60' : pct >= 50 ? '#f39c12' : '#e74c3c';
        }
    }
    
    // Reload data function - tries to load from file if possible
    function reloadData() {
        console.log('手动重新加载所有数据...');
        const statusEl = document.getElementById('dataStatus');
        if (statusEl) {
            statusEl.textContent = '正在重新加载所有数据...';
            statusEl.style.color = '#f39c12';
        }
        
        // Reload main data first
        fetch('_nav-data.json?_t=' + Date.now())
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            })
            .then(data => {
                allPhasesData = data;
                currentPhaseNum = data.currentPhase || 1;
                
                // Reload current phase data
                loadPhaseData(currentPhaseNum);
                renderPhaseButtons();
                
                console.log('数据重新加载成功');
            })
            .catch(error => {
                console.error('重新加载数据失败:', error);
                if (statusEl) {
                    statusEl.textContent = `重新加载失败: ${error.message}`;
                    statusEl.style.color = '#e74c3c';
                }
            });
    }

</script>

</body>
</html>
